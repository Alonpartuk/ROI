name: Clarity daily insights pull

# Runs daily at 6 AM UTC — pulls yesterday's Clarity data and commits to repo
on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # allow manual trigger from Actions tab

jobs:
  pull-clarity:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit the daily JSON file

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: etl-pipeline/dashboard/server/package-lock.json

      - name: Install dependencies
        working-directory: etl-pipeline/dashboard/server
        run: npm ci --no-audit --no-fund

      - name: Run Clarity daily pull
        working-directory: etl-pipeline/dashboard/server
        env:
          CLARITY_API_TOKEN: ${{ secrets.CLARITY_API_TOKEN }}
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}
        run: node scripts/clarity_daily_cron.js

      - name: Commit data file (if changed)
        run: |
          git config user.name "octup-clarity-cron"
          git config user.email "actions@github.com"
          git add clarity_data/
          if ! git diff --staged --quiet; then
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore: clarity insights for $DATE [skip ci]"
            git push
          else
            echo "No new data to commit (file may already exist for today)."
          fi
